{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>{% block title %}{{ survey.title }}{% endblock %}</title>

  <!-- Bootstrap 5 CSS (CDN — no app chrome) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --dodo-blue: #0077c8;
      --dodo-blue-dark: #005ea0;
      --dodo-blue-light: #e6f2fb;
      --dodo-green: #16a34a;
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--dodo-blue); }
    a:hover { color: var(--dodo-blue-dark); }
    .public-shell { max-width: 760px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
    .public-topbar {
      display: flex; align-items: center; gap: .65rem;
      padding: .85rem 0; margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      font-size: .85rem; color: var(--muted);
    }
    .public-topbar .brand-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--dodo-blue); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .92rem;
    }
    .public-topbar .brand-name { font-weight: 700; color: var(--text); font-size: .92rem; }
    .public-footer {
      max-width: 760px; margin: 1.5rem auto 0; padding: 1rem;
      font-size: .74rem; color: #94a3b8; text-align: center;
    }
    .public-footer a { color: #94a3b8; text-decoration: underline; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-closed { background: #fee2e2; color: #991b1b; }
    .badge-not_started, .badge-paused { background: #fef3c7; color: #854d0e; }

    /* Form polish for the standalone form */
    .form-control, .form-select { font-size: .9rem; border-radius: 8px; border-color: var(--border); }
    .form-control:focus, .form-select:focus {
      border-color: var(--dodo-blue);
      box-shadow: 0 0 0 3px rgba(0,119,200,0.12);
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

<header class="public-shell" style="padding-bottom:0;">
  <div class="public-topbar">
    <span class="brand-mark">D</span>
    <span class="brand-name">Dodo</span>
    <span style="margin-left:auto;font-size:.74rem;color:#94a3b8;">
      <i class="bi bi-shield-check me-1"></i>Secure form
    </span>
  </div>
</header>

<main class="public-shell" style="padding-top:0;">
  {% block content %}{% endblock %}
</main>

<footer class="public-footer">
  Powered by Dodo M&amp;E · <a href="#" onclick="event.preventDefault();">Privacy</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
